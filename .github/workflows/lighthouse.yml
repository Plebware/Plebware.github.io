name: Lighthouse CI Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for site to be ready (if using Pages)
        run: sleep 10

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://plebware.github.io/
            https://plebware.github.io/research/
            https://plebware.github.io/author/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
