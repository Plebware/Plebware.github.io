# Site settings
title: "Plebware Control Centre"
author: "Otto Brinkmeier"
description: "Plebware: accessible, repairable, understandable technology"
baseurl: ""  # Leave empty for organization site
url: "https://Plebware.github.io"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-remote-theme

# Remote theme (your central theme repository)
remote_theme: Plebware/pleb-theme

# Collections for different content types
collections:
  fiction:
    output: true
    permalink: /fiction/:path/
  devotions:
    output: true
    permalink: /devotions/:path/
  journals:
    output: true
    permalink: /journals/:path/
  creative:
    output: true
    permalink: /creative/:path/

# Default layouts for collections
defaults:
  - scope:
      path: ""
      type: fiction
    values:
      layout: post
  - scope:
      path: ""
      type: devotions
    values:
      layout: post
  - scope:
      path: ""
      type: journals
    values:
      layout: post
  - scope:
      path: ""
      type: creative
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

# Exclude files from the built site
exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
